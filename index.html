<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本週主播榮譽榜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Work+Sans:wght@400;600;700;900&family=Lato:wght@400;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#0d0d0d;
    --card-bg:#151515;
    --brand:#00D2BE;
    --white:#FFFFFF;
    --yellow:#FFD100;
    --purple:#8238ba;
    --pink:#f6418d;
    --red:#cf0404;
    --blue:#60c4e8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(130% 80% at 50% -12%, color-mix(in srgb, var(--brand) 55%, var(--bg)) 0%, transparent 55%),
      radial-gradient(100% 70% at 50% 118%, color-mix(in srgb, var(--purple) 48%, var(--bg)) 0%, transparent 62%),
      radial-gradient(60% 45% at 12% 30%, color-mix(in srgb, var(--pink) 28%, var(--bg)) 0%, transparent 62%),
      radial-gradient(60% 45% at 88% 30%, color-mix(in srgb, var(--blue) 28%, var(--bg)) 0%, transparent 62%),
      linear-gradient(180deg, #1c232a 0%, #12161a 55%, #0a0b0e 100%);
    background-attachment:fixed;
    color:var(--white);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:50px;
    min-height:100vh;
    position:relative;
  }
  .pixel{ font-family:'Press Start 2P', cursive; }

  /* 舞台聚光燈光束 */
  body::after{
    content:"";
    position:fixed; inset:0; z-index:0;
    pointer-events:none;
    background:
      conic-gradient(from 0deg at 50% -8%,
        transparent 136deg,
        rgba(96,196,232,0.10) 145deg, transparent 153deg,
        transparent 158deg,
        rgba(0,210,190,0.16) 167deg, transparent 178deg,
        rgba(255,209,0,0.13) 182deg, transparent 193deg,
        transparent 198deg,
        rgba(246,65,141,0.11) 207deg, transparent 215deg,
        transparent 360deg);
    -webkit-mask-image:linear-gradient(180deg, #000 0%, rgba(0,0,0,0.5) 38%, transparent 62%);
    mask-image:linear-gradient(180deg, #000 0%, rgba(0,0,0,0.5) 38%, transparent 62%);
    mix-blend-mode:screen;
    animation:beamSway 7s ease-in-out infinite;
    transform-origin:50% 0%;
  }
  @keyframes beamSway{
    0%,100%{ transform:rotate(-1.5deg); opacity:.85; }
    50%{ transform:rotate(1.5deg); opacity:1; }
  }

  body::before{
    content:"";
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px),
      radial-gradient(1px 1px at 10% 8%, rgba(255,255,255,0.12) 1px, transparent 0),
      radial-gradient(1px 1px at 80% 15%, rgba(0,210,190,0.18) 1px, transparent 0),
      radial-gradient(1px 1px at 30% 40%, rgba(255,209,0,0.15) 1px, transparent 0),
      radial-gradient(1px 1px at 65% 70%, rgba(246,65,141,0.15) 1px, transparent 0),
      radial-gradient(1px 1px at 15% 85%, rgba(130,56,186,0.15) 1px, transparent 0);
    background-size:40px 40px, 40px 40px, 100% 100%, 100% 100%, 100% 100%, 100% 100%, 100% 100%;
    -webkit-mask-image:radial-gradient(circle at 50% 30%, #000 60%, transparent 100%);
    mask-image:radial-gradient(circle at 50% 30%, #000 60%, transparent 100%);
    pointer-events:none;
  }

  header{
    text-align:center;
    padding:32px 20px 8px;
    position:relative; z-index:1;
  }
  .deco-crown{
    width:64px; height:auto; image-rendering:pixelated;
    display:block; margin:0 auto 6px;
    filter:drop-shadow(0 3px 6px rgba(0,0,0,0.5));
    animation:float 3.2s ease-in-out infinite;
  }
  .title-row{
    display:flex; align-items:center; justify-content:center; gap:14px;
    max-width:100%; padding:0 8px; flex-wrap:nowrap;
  }
  .title-row h1{ flex:0 1 auto; min-width:0; white-space:nowrap; }
  .deco-gem{
    flex:0 0 auto;
    width:26px; height:26px; image-rendering:pixelated;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    animation:float 2.6s ease-in-out infinite;
  }
  .deco-gem:last-child{ animation-delay:.5s; }
  @media (max-width: 480px){
    .title-row{ gap:9px; }
    .title-row h1{ font-size:28px !important; }
    .deco-gem{ width:22px; }
    .deco-crown{ width:54px; }
  }
  h1{
    font-size:22px;
    line-height:1.6;
    margin:0 0 10px;
    color:var(--white);
    letter-spacing:1px;
  }
  .week-pill{
    display:inline-flex; align-items:center; gap:8px; font-size:13px;
  }
  .week-pill span.date{
    background:var(--brand); color:var(--bg); font-weight:900;
    padding:5px 12px; border-radius:4px;
  }
  .hint{
    text-align:center; font-size:12.5px; color:#888;
    margin:10px 0 22px; padding:0 30px;
  }

  /* grid */
  .grid{
    position:relative; z-index:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    max-width:460px;
    margin:0 auto;
    padding:0 16px;
    perspective:900px;
  }
  .tile{
    background:
      linear-gradient(155deg, color-mix(in srgb, var(--accent, var(--brand)) 42%, var(--card-bg)) 0%, color-mix(in srgb, var(--accent, var(--brand)) 12%, var(--card-bg)) 70%);
    border:2.5px solid var(--accent, var(--brand));
    border-radius:14px;
    padding:14px 12px;
    cursor:pointer;
    box-shadow:0 0 0 rgba(0,0,0,0);
    animation:float 3.2s ease-in-out infinite;
    -webkit-tap-highlight-color:transparent;
  }
  .tile:nth-child(odd){ animation-duration:3.4s; }
  .tile:nth-child(1){ animation-delay:0s; }
  .tile:nth-child(2){ animation-delay:.4s; }
  .tile:nth-child(3){ animation-delay:.8s; }
  .tile:nth-child(4){ animation-delay:.2s; }
  .tile:nth-child(5){ animation-delay:.6s; }
  .tile:nth-child(6){ animation-delay:1s; }
  .tile:nth-child(7){ animation-delay:.3s; }
  .tile:nth-child(8){ animation-delay:.7s; }
  @keyframes float{
    0%,100%{ transform:translateY(0px); }
    50%{ transform:translateY(-7px); }
  }
  .tile:active{ transform:scale(0.96); }
  .tile.flipping{
    animation:tileFlip .36s cubic-bezier(.4,.0,.7,.2) forwards;
    z-index:10;
    transform-style:preserve-3d;
    backface-visibility:hidden;
  }
  @keyframes tileFlip{
    0%{   transform:perspective(900px) rotateY(0deg) scale(1);    opacity:1; }
    100%{ transform:perspective(900px) rotateY(90deg) scale(1.15); opacity:0; }
  }

  .tile-badge{
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px;
    background:color-mix(in srgb, var(--accent, var(--brand)) 50%, var(--bg));
    border:2px solid var(--accent, var(--brand));
    border-radius:6px;
    font-size:17px;
    margin-bottom:8px;
    image-rendering:pixelated;
    box-shadow: 2px 2px 0 var(--accent, var(--brand));
  }
  .tile-title{
    font-size:14px; font-weight:900; color:var(--accent, var(--brand));
    margin:0 0 6px; line-height:1.4;
  }
  .tile-desc{
    font-size:12px; color:var(--white); line-height:1.55; margin:0;
  }
  .tile.secret{
    border-style:dashed;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 6px, transparent 6px 12px),
      var(--card-bg);
  }
  .tile.secret .tile-title{ color:var(--white); }
  .tile.secret .tile-desc{ color:var(--white); }

  footer{
    position:relative; z-index:1;
    text-align:center; margin-top:34px; padding:0 20px;
  }
  footer p{ font-size:13px; color:#666; margin:4px 0; }
  footer .press{ font-family:'Press Start 2P', cursive; font-size:10px; color:var(--brand); margin-top:6px; }

  /* overlay detail view */
  .overlay{
    position:fixed; inset:0; z-index:50;
    background:
      radial-gradient(circle at 50% 34%, color-mix(in srgb, var(--accent, var(--brand)) 24%, transparent) 0%, transparent 58%),
      linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px),
      rgba(0,0,0,0.82);
    background-size:100% 100%, 34px 34px, 34px 34px, 100% 100%;
    backdrop-filter:blur(3px);
    display:none;
    align-items:center; justify-content:center;
    padding:24px;
    opacity:0;
    perspective:1000px;
    transition:opacity .25s ease;
  }
  .overlay.active{ display:flex; opacity:1; }

  .close-btn{
    position:absolute; top:20px; right:20px;
    width:38px; height:38px;
    background:var(--card-bg);
    border:2px solid var(--white);
    border-radius:8px;
    color:var(--white); font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }

  .detail-wrap{
    display:flex; flex-direction:column; align-items:center; gap:20px;
    max-width:360px; width:100%;
    transform:perspective(900px) rotateY(-90deg) scale(1.05);
    opacity:0;
    transform-style:preserve-3d;
    transition:transform .42s cubic-bezier(.15,.6,.3,1), opacity .18s ease;
  }
  .overlay.active .detail-wrap{
    transform:perspective(900px) rotateY(0deg) scale(1);
    opacity:1;
  }

  /* 手機版：避免卡片右上角壓到關閉鍵，並允許長卡滾動 */
  @media (max-width: 480px){
    .overlay{
      padding:64px 16px 28px;
      align-items:flex-start;
      overflow-y:auto;
    }
    .detail-wrap{ max-width:340px; margin:auto; }
    .close-btn{ top:14px; right:14px; }
  }

  .detail-card{
    width:100%;
    background:var(--card-bg);
    border:3px solid var(--accent, var(--brand));
    border-radius:16px;
    padding:32px 26px 30px;
    text-align:center;
  }
  .detail-icon{
    width:56px; height:56px;
    margin:0 auto 16px;
    background:var(--bg);
    border:2px solid var(--accent, var(--brand));
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
    box-shadow:3px 3px 0 var(--accent, var(--brand));
  }
  /* 主播頭貼佔位（後續串接平台 API 自動帶入照片）*/
  .avatar-slot{
    width:128px; height:128px;
    margin:0 auto 20px;
    border:2.5px dashed var(--accent, var(--brand));
    border-radius:14px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    background:repeating-linear-gradient(45deg, rgba(255,255,255,0.07) 0 8px, transparent 8px 16px);
    color:var(--accent, var(--brand));
    overflow:hidden;
  }
  .avatar-slot img{ width:100%; height:100%; object-fit:cover; border-radius:11px; }
  .avatar-slot.filled{ border-style:solid; background:none; }
  .avatar-slot .avatar-label{
    font-family:'Press Start 2P', cursive; font-size:8px; letter-spacing:1px;
  }
  .avatar-slot .avatar-sub{ font-size:11px; color:#cfcfcf; }
  .detail-title{
    font-size:30px; font-weight:900; color:var(--accent, var(--brand));
    margin:0 0 16px; line-height:1.4;
  }
  .detail-nickname{
    font-size:18px; font-weight:900; color:var(--white);
    margin:0 0 10px; line-height:1.4;
  }
  .detail-desc{
    font-size:17px; color:var(--white); line-height:1.7; margin:0 0 18px;
  }
  .detail-id{
    font-size:19px; font-weight:700; color:var(--white);
    margin:0 0 20px; border-radius:0px;
  }
  .detail-id .heart{ color:var(--accent, var(--brand)); }
  .detail-stat-label{
    font-size:15px; color:#EDEDED; margin:0 0 6px;
  }
  .detail-stat-value{
    font-family:'Lato', sans-serif;
    font-size:40px; color:var(--white); margin:0;
  }
  /* 二、三名：緊追在後 */
  .runners{
    margin-top:22px; padding-top:16px;
    border-top:1.5px dashed rgba(255,255,255,0.25);
    text-align:left;
  }
  .runners-head{
    font-family:'Work Sans', sans-serif;
    font-size:13px; font-weight:700; letter-spacing:.5px;
    color:var(--accent, var(--brand));
    margin:0 0 10px; text-align:center;
  }
  .runner-row{
    display:flex; align-items:center; gap:10px;
    padding:7px 0;
  }
  .runner-row + .runner-row{ border-top:1px solid rgba(255,255,255,0.08); }
  .runner-rank{
    flex:0 0 auto;
    width:22px; height:22px; border-radius:5px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Lato', sans-serif; font-size:13px; font-weight:900;
    color:var(--bg);
    background:var(--accent, var(--brand));
  }
  .runner-name{
    flex:1 1 auto; min-width:0;
    font-size:14px; font-weight:700; color:var(--white);
    display:flex; align-items:baseline; gap:6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .runner-id{ font-size:11px; font-weight:400; color:#9a9a9a; }
  .runner-val{
    flex:0 0 auto;
    font-family:'Lato', sans-serif; font-size:14px; font-weight:700;
    color:var(--accent, var(--brand));
  }
  .redraw-btn{
    background:transparent; color:var(--accent, var(--brand));
    border:2px solid var(--accent, var(--brand)); border-radius:8px;
    padding:9px 16px; font-size:13px; font-weight:900;
    cursor:pointer;
  }
  .luck-greeting{
    font-family:'Work Sans', sans-serif;
    font-size:18px; font-weight:700; line-height:1.6; color:var(--yellow);
    margin:0 0 14px;
  }
  .luck-animal{
    width:120px; height:120px; object-fit:contain;
    image-rendering:pixelated;
    display:block; margin:0 auto 16px;
    animation:float 3s ease-in-out infinite;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));
  }

  .share-pill{
    width:100%;
    background:transparent;
    color:var(--brand);
    border:2px solid var(--brand);
    border-radius:999px;
    padding:14px 20px;
    font-size:15px; font-weight:900;
    display:flex; align-items:center; justify-content:center; gap:8px;
    cursor:pointer;
  }
  .share-pill:active{ transform:scale(0.97); }

  .share-template{
    position:fixed; top:-9999px; left:-9999px;
    width:380px; padding:32px 26px;
    background:var(--card-bg); border:3px solid var(--accent, var(--brand));
    border-radius:16px; text-align:center;
  }

  .toast{
    position:fixed; bottom:24px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--white); color:var(--bg);
    padding:12px 20px; border-radius:8px; font-size:14px; font-weight:700;
    opacity:0; transition:all .25s ease; pointer-events:none; z-index:999;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce){
    .tile{ animation:none; }
    .detail-wrap{ transition:none; }
    body::after{ animation:none; }
    .deco-crown, .deco-gem{ animation:none; }
  }
  .game-unlock{
    max-width:400px; margin:26px auto 0; padding:0 20px;
    text-align:center; opacity:0; max-height:0; overflow:hidden;
    transition:opacity .4s ease, max-height .4s ease;
  }
  .game-unlock.show{ opacity:1; max-height:120px; }
  .game-unlock-btn{
    background:#FFD100; color:#0d0d0d; border:none; border-radius:10px;
    padding:14px 22px; font-size:14px; font-weight:900; cursor:pointer;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.04);} }
  .game-overlay{
    position:fixed; inset:0; z-index:60; background:rgba(0,0,0,0.88);
    display:none; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; padding:20px;
  }
  .game-overlay.active{ display:flex; }
  .game-title{ font-size:16px; color:#FFD100; font-weight:900; text-align:center; }
  #gameCanvas{
    width:100%; max-width:380px; aspect-ratio:5/3;
    background:linear-gradient(180deg,#1a1a2e 0%,#16161f 70%,#0d0d0d 100%);
    border:3px solid #00D2BE; border-radius:12px; touch-action:none;
  }
  .game-hud{
    display:flex; justify-content:space-between; width:100%; max-width:380px;
    font-size:13px; font-weight:900; color:#fff;
  }
  .game-close{
    background:transparent; color:#888; border:2px solid #444;
    border-radius:8px; padding:8px 16px; font-size:13px; cursor:pointer;
  }
  .game-hint{ font-size:12px; color:#888; text-align:center; }

  /* 語言切換按鈕 */
  .lang-switch{
    position:fixed; top:16px; right:16px; z-index:70;
    display:flex; background:rgba(21,21,21,0.85);
    border:2px solid var(--brand); border-radius:999px;
    padding:4px; gap:2px;
    backdrop-filter:blur(4px);
  }
  .lang-btn{
    border:none; background:transparent; color:#888;
    font-size:12px; font-weight:900; padding:6px 12px;
    border-radius:999px; cursor:pointer;
    font-family:'Noto Sans TC', sans-serif;
  }
  .lang-btn.active{ background:var(--brand); color:var(--bg); }
</style>
</head>
<body>

<div class="lang-switch" id="langSwitch">
  <button class="lang-btn" data-lang="zh">中文</button>
  <button class="lang-btn" data-lang="en">EN</button>
</div>

  <img id="pre-cat" src="cat.png" alt="">
  <img id="pre-hamster" src="hamster.png" alt="">
</div>

function num(v){ return typeof v === 'number' ? v : (parseFloat(String(v).replace(/[^0-9.\-]/g,'')) || 0); }

function formatDiamond(v) {
  const n = num(v);
  if (n >= 1000000) {
    const truncated = Math.floor(n / 100000) / 10;
    return truncated + 'M 鑽';
  }
  if (n >= 10000) {
    const truncated = Math.floor(n / 1000) / 10;
    return truncated + '萬 鑽';
  }
  return n.toLocaleString() + ' 鑽';
}

const CARDS_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ93w4z4KmkSioZMtAZoJ8XYSOn3-woLvtHSYPSIp11vOjY91pkln1HpVr6LAEL8VX4-v5P35SV_kGC/pub?gid=1574134833&single=true&output=csv";

// 通用 CSV 解析（支援含逗號／換行的引號欄位）
function parseCSV(text){
  const rows = []; let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"'){ if (text[i+1] === '"'){ field += '"'; i++; } else inQ = false; }
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r'){ /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}
function parseCSVObjects(text){
  const rows = parseCSV(text).filter(r => r.some(c => c.trim() !== ''));
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    const o = {}; head.forEach((h, i) => o[h] = (r[i] ?? '').trim()); return o;
  });
}

function updateWeekPill(weekStart){
  if (!weekStart) return;
  const d = new Date(weekStart + 'T00:00:00');
  if (isNaN(d)) return;
  const end = new Date(d); end.setDate(end.getDate() + 6);
  const f = x => `${x.getFullYear()}/${String(x.getMonth()+1).padStart(2,'0')}/${String(x.getDate()).padStart(2,'0')}`;
  const el = document.querySelector('.week-pill .date');
  if (el) el.textContent = `${f(d)}-${f(end)}`;
}

async function loadCards(){
  if (!CARDS_SHEET_URL) return;
  try {
    const res = await fetch(CARDS_SHEET_URL);
    const objs = parseCSVObjects(await res.text());
    if (!objs.length) return;
    // 只取最新一週
    const weeks = objs.map(o => o.week_start).filter(Boolean).sort();
    const latest = weeks[weeks.length - 1];
    let rows = objs.filter(o => !latest || o.week_start === latest);
    rows.sort((a, b) => (parseFloat(a.rank_order)||0) - (parseFloat(b.rank_order)||0));
    DATA = rows.map(o => ({
      icon: o.icon || '🏆',
      accent: o.accent_color || 'var(--brand)',
      award: o.award_name || '',
      nickname: o.nickname || '',
      desc: o.detail_desc || '',
      id: o.creator_id || '',
      statLabel: o.stat_label || '',
      statValue: o.stat_value || '',
      avatar: o.avatar_url || '',
      awardKey: o.award_key || ''

    // 二、三名：讀表格 runner_up_1_id/value（=第2名）、runner_up_2_id/value（=第3名）；未提供則用假資料
    DATA.forEach((d, i) => {

        rank: n + 1,
        nickname: o['runner_up_' + n + '_name'] || '',

        value: o['runner_up_' + n + '_value'] || ''
      })).filter(r => r.id || r.nickname);
      d.runnersUp = rs.length ? rs : defaultRunners(i);
    });
    updateWeekPill(latest);
    buildGrid();
  } catch(e){ /* 抓取失敗則保留內建資料 */ }
}

// 現以 pravatar 產生假頭貼作為示範；未取到圖片時自動保留虛線佔位。
async function fetchAvatarUrl(item){
  return item.avatar || '';   // Google Sheet 的 avatar_url；空值則保留虛線佔位
}

async function loadAvatar(slot, item){
  if (!slot) return;
  try {
    const url = await fetchAvatarUrl(item);
    if (!url) return;
    const img = new Image();
    img.crossOrigin = 'anonymous';   // 讓跨網域頭貼也能被截圖（需來源支援 CORS）
    img.alt = item.nickname;
    img.onload = () => {
      slot.innerHTML = '';
      slot.appendChild(img);
      slot.classList.add('filled');
    };
    img.onerror = () => {};   // 失敗則保留虛線佔位
    img.src = url;
  } catch(e){ /* 保留虛線佔位 */ }
}

    <img class="luck-animal" src="${animSrc(a.key)}" alt="">
    <p class="detail-title" style="color:var(--white);">${t('secretCardTitle')}</p>
    <p class="detail-desc" style="font-size:16px;">${q}</p>
    <button class="redraw-btn" id="redrawBtn">${t('redraw')}</button>
  `;
}

let flipping = false;

// ===== 翻卡音效（Web Audio 合成，免外部檔案）=====
// 可選：'coin' 金幣叮叮 ｜ 'coin_crisp' 清脆金幣 ｜ 'ding' 清亮鈴聲
//        ｜ 'sparkle' 星光上升音 ｜ 'flip' 翻紙唰聲
let FLIP_SOUND = 'sparkle';
let audioCtx = null;

function _tone(ctx, t, freq, vol, dur, type){
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(t); osc.stop(t + dur + 0.02);
}

const SOUNDS = {
  // 方波雙音，帶金屬感的「叮叮」
  coin(ctx, now){
    const coin = (t, f1, f2, vol) => {
      _tone(ctx, t, f1, vol, 0.18, 'square');
      _tone(ctx, t, f2, vol * 0.7, 0.18, 'square');
    };
    coin(now, 988, 1319, 0.15);
    coin(now + 0.09, 1319, 1760, 0.13);
  },
  // 更高、更短促、更亮的清脆金幣
  coin_crisp(ctx, now){
    _tone(ctx, now,         1568, 0.16, 0.12, 'triangle'); // G6
    _tone(ctx, now,         2093, 0.10, 0.12, 'sine');     // C7 泛音
    _tone(ctx, now + 0.075, 2349, 0.15, 0.16, 'triangle'); // D7 上揚
    _tone(ctx, now + 0.075, 3136, 0.08, 0.16, 'sine');     // G7 泛音
  },
  // 單顆清亮鈴聲
  ding(ctx, now){
    _tone(ctx, now, 2093, 0.16, 0.5, 'sine');
    _tone(ctx, now, 3136, 0.06, 0.4, 'sine');
  },
  // 星光上升琶音
  sparkle(ctx, now){
    [1319, 1760, 2093, 2637].forEach((f, i) =>
      _tone(ctx, now + i * 0.05, f, 0.12, 0.25, 'triangle'));
  },
  // 濾波白噪音「唰」翻紙聲
  flip(ctx, now){
    const dur = 0.32;
    const frames = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, frames, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < frames; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.Q.value = 0.9;
    bp.frequency.setValueAtTime(900, now);
    bp.frequency.exponentialRampToValueAtTime(2600, now + 0.13);
    bp.frequency.exponentialRampToValueAtTime(700, now + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, now);
    g.gain.exponentialRampToValueAtTime(0.3, now + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    noise.connect(bp); bp.connect(g); g.connect(ctx.destination);
    noise.start(now); noise.stop(now + dur);
  },
  // 魔法音效：上升琶音 + 閃爍泛音 + 尾端「叮」，帶奇幻感
  magic(ctx, now){
    // 上升的魔法琶音（五聲音階）
    [1047, 1319, 1568, 2093, 2637, 3136].forEach((f, i) => {
      _tone(ctx, now + i * 0.045, f, 0.11, 0.4, 'triangle');
    });
    // 高頻閃爍顆粒（sparkle shimmer）
    for (let i = 0; i < 7; i++){
      const t = now + 0.05 + Math.random() * 0.35;
      const f = 2600 + Math.random() * 2600;
      _tone(ctx, t, f, 0.045, 0.14, 'sine');
    }
    // 尾端清亮的「叮」定音
    _tone(ctx, now + 0.34, 3136, 0.13, 0.55, 'sine');
    _tone(ctx, now + 0.34, 4186, 0.05, 0.45, 'sine');
    // 低頻魔力嗡鳴鋪底
    const sub = ctx.createOscillator();
    const sg = ctx.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(180, now);
    sub.frequency.exponentialRampToValueAtTime(320, now + 0.4);
    sg.gain.setValueAtTime(0.0001, now);
    sg.gain.exponentialRampToValueAtTime(0.06, now + 0.1);
    sg.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
    sub.connect(sg); sg.connect(ctx.destination);
    sub.start(now); sub.stop(now + 0.55);
  }
};

function playFlipSound(sound){
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const name = sound || FLIP_SOUND;
    (SOUNDS[name] || SOUNDS.coin_crisp)(audioCtx, audioCtx.currentTime);
  } catch(e){ /* 音效失敗不影響動畫 */ }
}

grid.addEventListener('click', (e) => {
  const tile = e.target.closest('.tile');
  if (!tile || flipping) return;

  viewedTiles.add(tile.dataset.idx);
  if (viewedTiles.size >= totalTiles) {
    document.getElementById('gameUnlock').classList.add('show');
  }

  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const openDetail = () => {
    if (tile.dataset.idx === 'secret') {
      isSecretOpen = true;
      renderSecret();
    } else {
      isSecretOpen = false;
      currentItem = DATA[tile.dataset.idx];
      renderDetail(currentItem);
    }
    overlay.classList.add('active');
  };

  if (reduce) { openDetail(); return; }

  // 翻牌轉到側邊（90°、邊緣朝前）時，詳情卡從另一側接續同方向轉正，動作連貫
  flipping = true;
  playFlipSound(tile.dataset.idx === 'secret' ? 'magic' : null);
  tile.classList.add('flipping');
  setTimeout(openDetail, 330);
  tile.addEventListener('animationend', () => {
    tile.classList.remove('flipping');
    flipping = false;
  }, { once: true });
});

detailCard.addEventListener('click', (e) => {
  if (e.target.id === 'redrawBtn') renderSecret();
});

document.getElementById('closeBtn').addEventListener('click', closeOverlay);
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeOverlay();
});

function closeOverlay(){
  overlay.classList.remove('active');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

sharePill.addEventListener('click', async () => {
  if (typeof html2canvas === 'undefined') {
    showToast('圖片產生元件未載入，請確認網路後重試');
    return;
  }
  const prev = sharePill.textContent;
  sharePill.textContent = '產生圖卡中…';
  try {
    const cardBg = getComputedStyle(detailCard).backgroundColor || '#141414';
    const canvas = await html2canvas(detailCard, {
      backgroundColor: cardBg,
      scale: Math.min(2, window.devicePixelRatio || 1),
      useCORS: true,
      allowTaint: false,
      logging: false
    });
    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    sharePill.textContent = prev;
    if (!blob) { showToast('產生圖卡失敗，請再試一次'); return; }

    const name = isSecretOpen ? '本週小語.png' : `${currentItem.id}_榮譽卡.png`;
    const file = new File([blob], name, { type: 'image/png' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: '本週主播榮譽榜' });
        showToast('分享成功！');
        return;
      } catch (err) {
        if (err && err.name === 'AbortError') return;  // 使用者自行取消，不算失敗
      }
    }
    // 不支援原生分享 → 下載圖片
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('圖卡已下載！');
  } catch(err) {
    sharePill.textContent = prev;
    showToast('產生圖卡失敗，請再試一次');
  }
});

// ===== 隱藏小遊戲：主播衝刺跑 =====
const GAME_SPRITES = {
  run_0: "run_0.png",
  run_1: "run_1.png",
  run_2: "run_2.png",
  run_3: "run_3.png",
  run_4: "run_4.png",
  diamond: "diamond.png",
  rock1: "rock1.png",
  grass: "grass.png",
  rock_grass: "rock_grass.png"
};

(function(){
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const gameOverlay = document.getElementById('gameOverlay');
  const gameUnlockBtn = document.getElementById('gameUnlockBtn');
  const gameCloseBtn = document.getElementById('gameCloseBtn');
  const scoreEl = document.getElementById('gameScore');
  const bestEl = document.getElementById('gameBest');

  const CW = canvas.width, CH = canvas.height;
  const GROUND_Y = CH - 50;

  const runImgs = ['run_0','run_1','run_2','run_3','run_4'].map(k => {
    const img = new Image();
    img.src = GAME_SPRITES[k];
    return img;
  });
  const obstacleKeys = ['rock1','grass','rock_grass'];
  const obstacleImgs = obstacleKeys.map(k => {
    const img = new Image();
    img.src = GAME_SPRITES[k];
    return img;
  });
  const diamondImg = new Image();
  diamondImg.src = GAME_SPRITES['diamond'];

  let best = Number(localStorage.getItem('sprint_best') || 0);
  bestEl.textContent = '最高：' + best;

  let state = 'idle';
  let player, obstacles, diamonds, speed, score, frame, spawnTimer, diamondTimer, animFrame, animTimer;

  function resetGame(){
    player = { x: 60, y: GROUND_Y - 70, w: 56, h: 70, vy: 0, jumping: false };
    obstacles = [];
    diamonds = [];
    speed = 4.5;
    score = 0;
    frame = 0;
    spawnTimer = 0;
    diamondTimer = 0;
    animFrame = 0;
    animTimer = 0;
    state = 'playing';
  }

  function jump(){
    if (state === 'idle' || state === 'over') { resetGame(); return; }
    if (!player.jumping) {
      player.vy = -13;
      player.jumping = true;
    }
  }

  canvas.addEventListener('click', jump);
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && gameOverlay.classList.contains('active')) {
      e.preventDefault();
      jump();
    }
  });

  gameUnlockBtn.addEventListener('click', () => {
    gameOverlay.classList.add('active');
    if (state === 'idle' || state === 'over') {
      drawIdleScreen();
    }
  });
  gameCloseBtn.addEventListener('click', () => {
    gameOverlay.classList.remove('active');
    state = 'idle';
  });

  function spawnObstacle(){
    const key = Math.floor(Math.random() * obstacleImgs.length);
    const h = 50 + Math.random() * 20;
    obstacles.push({ x: CW + 20, y: GROUND_Y - h + 10, w: h * 0.9, h: h, imgIdx: key });
  }

  function spawnDiamond(){
    const y = GROUND_Y - 90 - Math.random() * 40;
    diamonds.push({ x: CW + 20, y, w: 34, h: 34, collected: false });
  }

  function rectsOverlap(a, b){
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function drawBackground(){
    ctx.clearRect(0, 0, CW, CH);
    ctx.strokeStyle = 'rgba(0,210,190,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + 20);
    ctx.lineTo(CW, GROUND_Y + 20);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (let i = 0; i < 12; i++) {
      const x = (i * 83 + (frame * 0.6)) % CW;
      ctx.fillRect(x, 30 + (i % 4) * 20, 2, 2);
    }
  }

  function drawIdleScreen(){
    drawBackground();
    ctx.drawImage(runImgs[0], player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('點擊畫面或按空白鍵開始', CW/2, CH/2);
  }

  function drawGameOver(){
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, CW, CH);
    ctx.fillStyle = '#FFD100';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('遊戲結束', CW/2, CH/2 - 16);
    ctx.fillStyle = '#fff';
    ctx.font = '16px sans-serif';
    ctx.fillText('本次分數：' + score, CW/2, CH/2 + 14);
    ctx.font = '13px sans-serif';
    ctx.fillStyle = '#aaa';
    ctx.fillText('點擊畫面或按空白鍵再玩一次', CW/2, CH/2 + 42);
  }

  function loop(){
    requestAnimationFrame(loop);

    if (state !== 'playing') return;

    frame++;
    scoreEl.textContent = '分數：' + score;

    player.vy += 0.7;
    player.y += player.vy;
    if (player.y >= GROUND_Y - player.h) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.jumping = false;
    }

    animTimer++;
    if (animTimer > 5) { animTimer = 0; animFrame = (animFrame + 1) % runImgs.length; }

    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnObstacle();
      spawnTimer = 55 + Math.random() * 45 - Math.min(speed * 3, 40);
    }
    diamondTimer--;
    if (diamondTimer <= 0) {
      spawnDiamond();
      diamondTimer = 90 + Math.random() * 90;
    }

    drawBackground();

    const runSprite = player.jumping ? runImgs[2] : runImgs[animFrame];
    ctx.drawImage(runSprite, player.x, player.y, player.w, player.h);
    const playerBox = { x: player.x + 10, y: player.y + 8, w: player.w - 20, h: player.h - 12 };

    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= speed;
      ctx.drawImage(obstacleImgs[o.imgIdx], o.x, o.y, o.w, o.h);
      const obBox = { x: o.x + 6, y: o.y + 6, w: o.w - 12, h: o.h - 10 };
      if (rectsOverlap(playerBox, obBox)) {
        endGame();
        return;
      }
      if (o.x < -60) obstacles.splice(i, 1);
    }

    for (let i = diamonds.length - 1; i >= 0; i--) {
      const d = diamonds[i];
      d.x -= speed;
      if (!d.collected) {
        ctx.drawImage(diamondImg, d.x, d.y, d.w, d.h);
        const dBox = { x: d.x, y: d.y, w: d.w, h: d.h };
        if (rectsOverlap(playerBox, dBox)) {
          d.collected = true;
          score += 20;
        }
      }
      if (d.x < -60) diamonds.splice(i, 1);
    }

    score += 1;
    if (frame % 300 === 0) speed += 0.4;
  }

  function endGame(){
    state = 'over';
    if (score > best) {
      best = score;
      localStorage.setItem('sprint_best', String(best));
      bestEl.textContent = '最高：' + best;
    }
    drawGameOver();
  }

  player = { x: 60, y: GROUND_Y - 70, w: 56, h: 70, vy: 0, jumping: false };
  runImgs[0].onload = () => { if (state === 'idle') drawIdleScreen(); };

  requestAnimationFrame(loop);
})();

</script>
